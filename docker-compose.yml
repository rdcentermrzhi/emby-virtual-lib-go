services:
  proxy:
    build:
      context: .
      dockerfile: docker/proxy.Dockerfile
    image: emby-virtual-lib/proxy:local
    container_name: emby-virtual-lib-proxy
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      EMBY_PROXY_RELOAD_TOKEN: change-me-in-production
    volumes:
      - ./config:/app/config
      - ./images:/app/images
    ports:
      - "${PROXY_HOST_PORT:-9098}:${PROXY_CONTAINER_PORT:-8000}"

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    image: emby-virtual-lib/admin:local
    container_name: emby-virtual-lib-admin
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      TZ: Asia/Shanghai
      PROXY_RELOAD_URL: http://proxy:8000/__internal/reload-config
      PROXY_RELOAD_TOKEN: change-me-in-production
    volumes:
      - ./config:/app/config
      - ./images:/app/images
    ports:
      - "${ADMIN_HOST_PORT:-8011}:${ADMIN_CONTAINER_PORT:-8011}"
    depends_on:
      - proxy
