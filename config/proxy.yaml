# 复制为 config/proxy.yaml 后按需修改。代理进程只读此文件（及环境变量中的 reload token 覆盖），不再从旧版 config.yaml 合并生成 config.json。
#
# listen: 监听地址，例如 ":8000" 或 "127.0.0.1:9098"
listen: ":8000"

# log_level: debug | info | warn | error
log_level: debug

# reload_token: 非空时 POST /__internal/reload-config 须带请求头 X-Emby-Virtual-Lib-Reload-Token。
# 环境变量 EMBY_PROXY_RELOAD_TOKEN 若设置则优先于本字段。
reload_token: ""
