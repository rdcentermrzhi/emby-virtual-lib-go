name: Docker Build

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push images to GHCR"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
    paths:
      - 'proxy/**'
      - 'admin/**'
      - 'web/**'
      - 'docker/**'
      - 'proxy/go.mod'
      - 'proxy/go.sum'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'proxy/**'
      - 'admin/**'
      - 'web/**'
      - 'docker/**'
      - 'proxy/go.mod'
      - 'proxy/go.sum'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: proxy
            dockerfile: docker/proxy.Dockerfile
          - name: admin
            dockerfile: docker/admin.Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and publish ${{ matrix.component.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
